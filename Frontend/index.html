<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="/logo/WBILogo.jpg" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: http: https: http://localhost:* http://127.0.0.1:* http://localhost:5000 http://127.0.0.1:5000 https://*.tile.openstreetmap.org https://cdnjs.cloudflare.com; font-src 'self' data: https:; connect-src 'self' data: blob: https: ws: wss: http://localhost:* http://127.0.0.1:* http://localhost:5000 http://127.0.0.1:5000 https://nominatim.openstreetmap.org; frame-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self';">
  <meta name="description" content="WBI - The all-in-one home service platform for professional cleaning, specialized repairs, and quick local deliveries." />
  <title>WBI | Your Home Services, Simplified</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body
  style="background-color: #ffffff; background: linear-gradient(to bottom, rgba(0, 166, 166, 0.03) 0%, rgba(41, 173, 129, 0.02) 10%, #ffffff 20%); margin: 0; padding: 0;">
  <div id="root"
    style="background-color: #ffffff; background: linear-gradient(to bottom, rgba(0, 166, 166, 0.03) 0%, rgba(41, 173, 129, 0.02) 10%, #ffffff 20%); min-height: 100dvh;">
    <!-- Inline Beautiful Splash Shell to fix NO_FCP and blank screen instantly -->
    <div style="margin: 0 auto; max-width: 480px; width: 100%; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Poppins', -apple-system, sans-serif; box-sizing: border-box; padding: 20px;">
      <div style="text-align: center;">
        <div style="position: relative; display: inline-block; margin-bottom: 24px;">
          <!-- Pulse background layer -->
          <div style="position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px; background: radial-gradient(circle, rgba(0, 166, 166, 0.15) 0%, transparent 70%); border-radius: 28px; animation: wbiPulse 2s infinite ease-in-out;"></div>
          <!-- Logo image placeholder / actual logo -->
          <img src="/logo/WBILogo.jpg" style="width: 88px; height: 88px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0, 166, 166, 0.15); border: 2px solid #ffffff; position: relative; z-index: 2;" alt="WBI Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
          <!-- Fallback initials if image fails or before it loads -->
          <div style="width: 88px; height: 88px; border-radius: 24px; background: linear-gradient(135deg, #00a6a6, #29ad81); box-shadow: 0 10px 25px rgba(0, 166, 166, 0.15); display: none; align-items: center; justify-content: center; color: #ffffff; font-weight: 700; font-size: 28px; border: 2px solid #ffffff; position: relative; z-index: 2;">WBI</div>
        </div>
        <h1 style="color: #0b8f8f; margin: 0; font-size: 24px; font-weight: 700; letter-spacing: 0.5px;">WBI</h1>
        <p style="color: #64748b; font-size: 13px; margin: 6px 0 24px 0; font-weight: 400;">Your Home Services, Simplified</p>
        <!-- Modern progress bar -->
        <div style="width: 140px; height: 4px; background-color: #e2e8f0; border-radius: 10px; margin: 0 auto; overflow: hidden; position: relative;">
          <div style="position: absolute; top: 0; left: 0; height: 100%; width: 50%; background: linear-gradient(90deg, #00a6a6, #29ad81); border-radius: 10px; animation: wbiProgress 1.6s infinite cubic-bezier(0.4, 0, 0.2, 1);"></div>
        </div>
      </div>
    </div>
    <style>
      @keyframes wbiPulse {
        0%, 100% { transform: scale(0.95); opacity: 0.5; }
        50% { transform: scale(1.08); opacity: 1; }
      }
      @keyframes wbiProgress {
        0% { left: -50%; width: 30%; }
        50% { width: 40%; }
        100% { left: 100%; width: 30%; }
      }
    </style>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
